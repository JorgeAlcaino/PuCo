services:
  - type: web
    name: puco
    runtime: python
    buildCommand: |
      npm install -g pnpm@10.33.0
      pnpm install --frozen-lockfile
      pnpm run build
      pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 120 --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: FLASK_ENV
        value: production
      - key: NODE_VERSION
        value: 22.0.0
      - key: MERCADO_PUBLICO_TICKET
        sync: false
