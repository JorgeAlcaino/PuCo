services:
  - type: web
    name: puco
    runtime: python
    buildCommand: |
      set -e
      npm install -g pnpm@10.33.0
      pnpm install
      pnpm run build
      ls -la dist/
      pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 180 --workers 1 --threads 4
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: FLASK_ENV
        value: production
      - key: NODE_VERSION
        value: 22.0.0
      - key: MERCADO_PUBLICO_TICKET
        sync: false
