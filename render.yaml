services:
  - type: web
    name: puco
    runtime: python
    buildCommand: |
      set -e
      npm install -g pnpm@10.33.0
      pnpm install
      pnpm run build
      ls -la dist/
      ls -la dist/assets/
      node <<'EOF'
      const fs = require("fs");

      const html = fs.readFileSync("dist/index.html", "utf8");
      const refs = [...html.matchAll(/(?:src|href)=["'](\/assets\/[^"']+)["']/g)].map((m) => m[1]);

      if (refs.length === 0) {
        console.error("No /assets references found in dist/index.html");
        process.exit(1);
      }

      const missing = refs.filter((ref) => !fs.existsSync(`dist${ref}`));
      if (missing.length > 0) {
        console.error("Missing built assets referenced by dist/index.html:");
        for (const ref of missing) {
          console.error(` - ${ref}`);
        }
        process.exit(1);
      }

      console.log(`Verified ${refs.length} asset reference(s) in dist/index.html`);
      EOF
      pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: FLASK_ENV
        value: production
      - key: NODE_VERSION
        value: 22.0.0
      - key: MERCADO_PUBLICO_TICKET
        sync: false
